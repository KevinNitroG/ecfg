# .goreleaser.yml
# Build configuration for GoReleaser
version: 2
project_name: ecfg

builds:
  - id: ecfg-lsp
    main: ./cmd/ecfg-lsp/main.go
    binary: ecfg-lsp
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - "386"

archives:
  - id: default
    formats:
      - tar.gz
      - zip
    files:
      - README.md

checksum:
  name_template: 'checksums.txt'

changelog:
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  github:
    owner: KevinNitroG
    name: ecfg
  draft: false
  prerelease: auto

# Customization notes:
# - GoReleaser will automatically detect version from git tags
# - Set GITHUB_TOKEN in repository secrets for publishing
