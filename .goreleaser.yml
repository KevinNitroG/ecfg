# .goreleaser.yml
# Build configuration for GoReleaser
version: 2
project_name: ecfg

builds:
  - id: ecfg-lsp
    main: ./cmd/ecfg-lsp/main.go
    binary: ecfg-lsp
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - "386"

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

changelog:
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'

release:
  github:
    owner: KevinNitroG
    name: ecfg
  draft: false
  prerelease: auto
  name_template: '{{ if .IsPrerelease }}Pre-release {{ .Version }}{{ else }}{{ .Version }}{{ end }}'

# Customization notes:
# - GoReleaser will automatically detect version from git tags
# - Set GITHUB_TOKEN in repository secrets for publishing